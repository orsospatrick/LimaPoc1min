<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lima CRM — LOR</title>
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/variables.css" />
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/components.css" />
    <link rel="stylesheet" href="./css/pages.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar__brand">Lima</div>
        <nav class="sidebar__nav">
          <a class="sidebar__link" href="./dashboard.html">Dashboard</a>
          <a class="sidebar__link" href="./dashboard.html#clients">Clients</a>
          <a class="sidebar__link is-active" href="./lor.html">LOR</a>
          <a class="sidebar__link" href="./dashboard.html#messages">Messages</a>
          <a class="sidebar__link" href="./dashboard.html#settings">Settings</a>
        </nav>
      </aside>
      <div class="main">
        <header class="topbar">
          <span class="topbar__user">
            <span class="avatar">CM</span>
            <span>Case Manager</span>
          </span>
          <a class="btn btn--ghost btn--sm" href="./dashboard.html">Dashboard</a>
        </header>
        <main class="page-body">
          <h1 class="page-title">Letters of recommendation</h1>
          <div class="pipeline" id="lor-pipeline"></div>
          <div class="filter-bar" style="align-items: flex-start">
            <div class="pills" id="lor-chips" style="flex: 1"></div>
          </div>
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Beneficiary</th>
                  <th>Recommender</th>
                  <th>CM</th>
                  <th>Visa</th>
                  <th>Status</th>
                  <th>Deadline</th>
                  <th>Overdue</th>
                </tr>
              </thead>
              <tbody id="lor-tbody"></tbody>
            </table>
          </div>
        </main>
      </div>
    </div>
    <button type="button" id="demo-reset" class="demo-reset-fab" title="Regenerate demo data">Reset demo</button>
    <script defer src="./js/mock-data.js"></script>
    <script defer src="./js/store.js"></script>
    <script defer src="./js/router.js"></script>
    <script defer src="./js/components.js"></script>
    <script defer src="./js/pages/lor.js"></script>
  </body>
</html>
