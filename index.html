<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lima CRM — Demo</title>
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/variables.css" />
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/components.css" />
    <link rel="stylesheet" href="./css/pages.css" />
  </head>
  <body>
    <div class="login-page">
      <div class="login-card">
        <h1>Lima CRM</h1>
        <p class="sub">
          Lightweight demo: 6 sample clients, no server. Pick an entry point, open a matter, use Tasks / Criteria. Data is stored in
          localStorage; <strong>Reset demo</strong> clears everything and reloads the default snapshot.
        </p>
        <div class="stack" style="gap: 12px">
          <button type="button" class="btn btn--primary" id="demo-cm" style="width: 100%">Log in as Client Manager (Sarah Chen)</button>
          <button type="button" class="btn btn--secondary" id="demo-ld" style="width: 100%">Log in as Leadership</button>
        </div>
      </div>
    </div>
    <script defer src="./js/mock-data.js"></script>
    <script defer src="./js/store.js"></script>
    <script defer src="./js/index-entry.js"></script>
  </body>
</html>
